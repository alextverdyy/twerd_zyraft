# Zyra FT dongle with Prospector status screen
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_HID_INDICATORS=n
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_SLEEP=n
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=100

# oskey default OS
CONFIG_ZMK_OSKEY_DEFAULT_OS_MACOS=y

# Display: disable ALS auto-brightness, use fixed max
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n

# Prospector status screen (choose one theme)
# CONFIG_PROSPECTOR_STATUS_SCREEN_CLASSIC=y
# CONFIG_PROSPECTOR_STATUS_SCREEN_RADII=y
# CONFIG_PROSPECTOR_STATUS_SCREEN_FIELD=y
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y

# Prospector adapter sets its own optimized LVGL defaults for the ST7789.
# Do not override them here.
